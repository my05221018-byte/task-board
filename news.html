<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技新闻</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-dark: #0f0f23;
            --bg-card: #1a1a2e;
            --bg-item: #0f3460;
            --accent: #e94560;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
        }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(233, 69, 96, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .title { font-size: 24px; font-weight: 600; }
        .header-buttons { display: flex; gap: 10px; }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-home { background: #4a5568; }
        
        .news-list {
            height: calc(100vh - 80px);
            overflow-y: auto;
            padding-right: 10px;
        }
        .news-list::-webkit-scrollbar { width: 6px; }
        .news-list::-webkit-scrollbar-track { background: transparent; }
        .news-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        
        .news-item {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 12px;
            border-left: 4px solid var(--accent);
            cursor: pointer;
            transition: all 0.3s;
        }
        .news-item:hover {
            transform: translateX(4px);
            background: #234375;
        }
        .news-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .news-desc {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.5;
        }
        .news-source {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        .error {
            text-align: center;
            padding: 40px;
            color: #ff4757;
        }
        .last-updated {
            text-align: center;
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 10px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--bg-card);
            padding: 32px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .modal-body {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .modal-source {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        .modal-link {
            display: inline-block;
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
            transition: opacity 0.3s;
        }
        .modal-link:hover { opacity: 0.9; }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">📰 科技新闻</div>
        <div class="header-buttons">
            <button class="btn btn-home" onclick="window.location.href='/'">🏠 看板</button>
            <button class="btn" onclick="fetchNews()" id="refreshBtn">🔄 刷新</button>
        </div>
    </div>
    <div class="news-list" id="newsList">
        <div class="loading">加载中...</div>
    </div>
    <div class="last-updated" id="lastUpdated"></div>

    <!-- 详情 Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-source" id="modalSource"></div>
            <br><br>
            <a class="modal-link" id="modalLink" href="" target="_blank">🔗 阅读原文</a>
            <button class="btn btn-home" style="margin-left: 10px;" onclick="closeModal()">关闭</button>
        </div>
    </div>

    <script>
        const NEWS_KEY = 'tech_news_cache';
        let articlesData = [];
        
        async function fetchNews() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '加载中...';
            
            try {
                // 先尝试从缓存读取
                const cached = localStorage.getItem(NEWS_KEY);
                if (cached) {
                    const data = JSON.parse(cached);
                    articlesData = data.articles || [];
                    renderNews(articlesData);
                }
                
                // 然后获取新数据
                const response = await fetch('https://feeds.bbci.co.uk/news/technology/rss.xml');
                const text = await response.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, 'text/xml');
                const items = xml.querySelectorAll('item');
                
                const articles = [];
                items.forEach((item, index) => {
                    if (index < 15) {
                        let title = item.querySelector('title')?.textContent || '';
                        let desc = item.querySelector('description')?.textContent || '';
                        let link = item.querySelector('link')?.textContent || '';
                        
                        // 清理 HTML 标签
                        desc = desc.replace(/<[^>]*>/g, '').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
                        
                        articles.push({
                            title: title.replace(/<!\[CDATA\[|\]\]>/g, ''),
                            desc: desc,
                            link: link,
                            source: 'BBC Tech'
                        });
                    }
                });
                
                articlesData = articles;
                
                // 保存到缓存
                localStorage.setItem(NEWS_KEY, JSON.stringify({
                    articles,
                    timestamp: Date.now()
                }));
                
                renderNews(articles);
                document.getElementById('lastUpdated').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN');
                
            } catch (e) {
                console.error(e);
                // 如果有缓存显示缓存
                const cached = localStorage.getItem(NEWS_KEY);
                if (cached) {
                    const data = JSON.parse(cached);
                    articlesData = data.articles || [];
                    renderNews(articlesData);
                    document.getElementById('lastUpdated').textContent = '（显示缓存数据）';
                } else {
                    document.getElementById('newsList').innerHTML = '<div class="error">加载失败，请点击刷新重试</div>';
                }
            }
            
            btn.disabled = false;
            btn.textContent = '🔄 刷新';
        }
        
        function renderNews(articles) {
            const list = document.getElementById('newsList');
            if (!articles || articles.length === 0) {
                list.innerHTML = '<div class="loading">暂无新闻</div>';
                return;
            }
            
            list.innerHTML = articles.map((article, index) => `
                <div class="news-item" onclick="showDetail(${index})">
                    <div class="news-title">${article.title}</div>
                    <div class="news-desc">${article.desc.substring(0, 150)}${article.desc.length > 150 ? '...' : ''}</div>
                    <span class="news-source">${article.source}</span>
                </div>
            `).join('');
        }
        
        function showDetail(index) {
            const article = articlesData[index];
            document.getElementById('modalTitle').textContent = article.title;
            document.getElementById('modalBody').textContent = article.desc;
            document.getElementById('modalSource').textContent = article.source;
            document.getElementById('modalLink').href = article.link;
            document.getElementById('modal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }
        
        // 点击背景关闭
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        // 页面加载时获取新闻
        fetchNews();
        
        // 每5分钟自动刷新
        setInterval(fetchNews, 5 * 60 * 1000);
    </script>
</body>
</html>
